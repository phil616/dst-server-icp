# CNB 云原生构建:打 tag 时自动构建离线发布包并发布到 Release(latest)。
# 流程:装 uv(CNB 本地化镜像) → build-release.sh(构建前端+内置 Python+打 tar.gz)
#       → git:release 创建/更新并标记 latest → cnbcool/attachments 上传 tar.gz 为 Release 附件。
# 发布后 install-dst.sh 即可从 /-/releases/latest/download/dst-serverd-x86_64-linux.tar.gz 拉取。
#
# 触发:推送任意 tag(如 v0.2.0)即触发。
$:
  tag_push:
    - name: 构建并发布 dst-serverd 离线包
      docker:
        # buildpack-deps 系,自带 curl/git/tar;Vite 6 + React 18 需 Node 18+。
        image: node:20
      stages:
        - name: 安装 uv(CNB 本地化镜像)
          script: |
            set -eu
            curl -fL --retry 3 -o /tmp/uv.tar.gz \
              https://cnb.cool/dreamreflex/localize-uv/-/releases/latest/download/uv-x86_64-unknown-linux-gnu.tar.gz
            mkdir -p /tmp/uv && tar -xzf /tmp/uv.tar.gz -C /tmp/uv
            install -m 0755 "$(find /tmp/uv -type f -name uv | head -n1)" /usr/local/bin/uv
            uv --version

        - name: 构建发布包
          script: |
            set -eu
            # 前端依赖走 npmmirror 加速(CI 内)。
            npm config set registry https://registry.npmmirror.com
            # 下载并缓存 standalone Python(python-build-standalone),供 build-release.sh 内置打包。
            # 若 CI 无法访问 github,可在仓库 CI 变量里设置 UV_PYTHON_INSTALL_MIRROR 后重试。
            uv python install 3.12
            bash build-release.sh --rebuild-frontend
            ls -lh dist/

        - name: 创建/更新 Release 并标记 latest
          type: git:release
          options:
            title: ${CNB_BRANCH}
            description: "dst-serverd ${CNB_BRANCH} —— CNB 自动构建的离线安装包(含内置 Python 与已构建前端)"
            latest: true

        - name: 上传发布包为 Release 附件
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/dst-serverd-x86_64-linux.tar.gz
